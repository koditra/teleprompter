<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Teleprompter</title>
    
    <script src="coi-serviceworker.js"></script>
    
    <script src="ffmpeg.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="stars"></div>

    <div class="container">
        <header class="controls-sidebar">
            <h2>Mission Control</h2>
            
            <div class="control-group">
                <label for="input">Transmission Script</label>
                <textarea id="input" placeholder="Enter your transmission script here..."></textarea>
            </div>

            <div class="control-row">
                <div class="control-group">
                    <label for="font">Font Size (px)</label>
                    <input type="range" id="font" min="24" max="80" step="2" value="48">
                </div>
            </div>

            <div class="button-grid">
                <button id="mirrorBtn" class="btn">Mirror Display</button>
                <button id="cameraBtn" class="btn btn-camera">Toggle Optics</button>
            </div>

            <div class="recording-controls">
                <button id="recordBtn" class="btn btn-record btn-large">Initiate Recording</button>
                <button id="downloadRecording" class="btn btn-download" disabled>Download MP4</button>
            </div>
        </header>

        <main class="prompter-area">
            <div id="viewer">
                <div id="scriptContainer">
                    <div id="script">Your transmission script will appear here.</div>
                </div>
                
                <div id="cameraWindow" style="display: none;">
                    <div id="cameraHeader">
                        <span>Optics Feed</span>
                        <button id="closeCamera">&times;</button>
                    </div>
                    <div class="video-container">
                        <video id="camera" autoplay muted playsinline></video>
                    </div>
                    <div id="resizeHandle"></div>
                </div>
            </div>
        </main>
    </div>

    <section id="recordings-modal" style="display: none;">
        <div class="modal-content">
            <h3>Transmission Ready</h3>
            <video id="latestRecording" controls></video>
            <button id="closeModal" class="btn">Close Video</button>
        </div>
    </section>

    <script type="module" src="script.js"></script>
</body>
</html>
