<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teleprompter & Recorder</title>
    
    <script src="coi-serviceworker.js"></script>
    <script src="ffmpeg.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="space-background">
        <div class="stars"></div>
        <div class="meteor-1"></div>
        <div class="meteor-2"></div>
        <div class="meteor-3"></div>
    </div>

    <div class="container">
        <aside class="controls-sidebar">
            <h2>Settings</h2>
            
            <div class="control-group">
                <label for="input">Script</label>
                <textarea id="input" placeholder="Type or paste your script here..."></textarea>
            </div>

            <div class="control-group">
                <label for="font">Font Size</label>
                <input type="range" id="font" min="24" max="120" step="2" value="60">
            </div>

            <div class="control-group">
                <label for="speed">Scroll Speed</label>
                <input type="range" id="speed" min="0.5" max="5" step="0.1" value="1.5">
            </div>

            <div class="button-grid">
                <button id="playScrollBtn" class="btn btn-action">Start Auto-Scroll</button>
                <button id="mirrorBtn" class="btn btn-action">Mirror Text</button>
                <button id="cameraBtn" class="btn btn-camera">Toggle Camera</button>
            </div>

            <div class="recording-controls">
                <button id="recordBtn" class="btn btn-record btn-large">Start Recording</button>
                <button id="downloadRecording" class="btn btn-download" disabled>Download Video</button>
            </div>
        </aside>

        <main class="prompter-area">
            <div id="viewer">
                <div id="scriptContainer">
                    <div id="script">Your script will appear here.</div>
                </div>
                
                <div id="cameraWindow" style="display: none;">
                    <div id="cameraHeader">
                        <span>Webcam Preview</span>
                        <button id="closeCamera">&times;</button>
                    </div>
                    <div class="video-container">
                        <video id="camera" autoplay muted playsinline></video>
                    </div>
                    <div id="resizeHandle"></div>
                </div>
            </div>
        </main>
    </div>

    <footer class="privacy-footer">
        Every piece of code is run locally on your browser. Privacy is important to us.
    </footer>

    <section id="recordings-modal" style="display: none;">
        <div class="modal-content">
            <h3>Video Ready</h3>
            <video id="latestRecording" controls></video>
            <button id="closeModal" class="btn btn-action">Close Video</button>
        </div>
    </section>

    <script type="module" src="script.js"></script>
</body>
</html>
