<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Teleprompter and Recorder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="controls-sidebar">
            <h2>Controls</h2>
            
            <div class="control-group">
                <label for="input">Script Text</label>
                <textarea id="input" placeholder="Enter script here..."></textarea>
            </div>

            <div class="control-row">
                <div class="control-group">
                    <label for="font">Font Size (px)</label>
                    <input type="range" id="font" min="24" max="80" step="2" value="48">
                </div>
            </div>

            <div class="button-grid">
                <button id="mirrorBtn" class="btn">Mirror Mode</button>
                <button id="fullscreenBtn" class="btn">Fullscreen</button>
                <button id="cameraBtn" class="btn btn-camera">Toggle Camera</button>
            </div>

            <div class="recording-controls">
                <button id="recordBtn" class="btn btn-record btn-large">Start Recording</button>
                <button id="downloadRecording" class="btn btn-download" disabled>Download MP4</button>
            </div>
        </header>

        <main class="prompter-area">
            <div id="viewer">
                <div id="scriptContainer">
                    <div id="script">Your script will appear here.</div>
                </div>
                
                <div id="cameraWindow" style="display: none;">
                    <div id="cameraHeader">
                        <span>Webcam Preview</span>
                        <button id="closeCamera">&times;</button>
                    </div>
                    <div class="video-container">
                        <video id="camera" autoplay muted playsinline></video>
                    </div>
                    <div id="resizeHandle"></div>
                </div>
            </div>
        </main>
    </div>

    <section id="recordings">
        <h3>Latest Recording Output</h3>
        <video id="latestRecording" controls style="display: none;"></video>
    </section>

    <script type="module" src="script.js"></script>
</body>
</html>
